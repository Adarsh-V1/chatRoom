<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ConvoLink Mark</title>
  <desc id="desc">Rounded square logo with linked nodes representing connected conversation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="0.55" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <rect x="12" y="12" width="232" height="232" rx="56" fill="url(#bg)" stroke="#5eead4" stroke-opacity="0.62" stroke-width="10"/>
  <path d="M84 170 128 128 172 86" fill="none" stroke="url(#line)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="84" cy="170" r="21" fill="#0f766e"/>
  <circle cx="128" cy="128" r="21" fill="#0f766e"/>
  <circle cx="172" cy="86" r="21" fill="#0f766e"/>
</svg>
